name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run full test suite
        run: cargo test --all-targets --all-features

      - name: Enforce Phase 3 acceptance gates
        run: cargo test --test phase3_acceptance

      - name: Enforce Phase 4 acceptance gates
        run: cargo test --test phase4_convergence

      - name: Enforce Phase 4.5 acceptance gates
        run: cargo test --test phase45_anchors

      - name: Enforce Phase 4.6 acceptance gates
        run: cargo test --test phase46_anchor_weighted

      - name: Enforce Phase 4.7 acceptance gates
        run: cargo test --test phase47_emergent_concepts

      - name: Enforce Phase 5.0 acceptance gates
        run: cargo test --test phase50_anchor_distance

      - name: Validate phase pipeline example
        run: cargo run --example phase2_pipeline --quiet

      - name: Validate multi-frame demo example
        run: cargo run --example phase3_multiframe --quiet

      - name: Validate emergent structure demo
        run: cargo run --example phase4_emergent --quiet

      - name: Validate concept-anchor demo
        run: cargo run --example phase45_concept_anchor --quiet

      - name: Validate anchor-weighted interpretation demo
        run: cargo run --example phase46_anchor_weighted --quiet

      - name: Validate emergent concept formation demo
        run: cargo run --example phase47_emergent_concepts --quiet

      - name: Validate anchor-derived relational distance demo
        run: cargo run --example phase50_anchor_distance --quiet
